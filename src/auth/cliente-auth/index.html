<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Direto com Nome</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f9; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 300px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { display: block; width: 93%; margin-bottom: 15px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #28a745; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background: #218838; }
        pre { background: #222; color: #00ff00; padding: 15px; border-radius: 5px; max-width: 500px; overflow-x: auto; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Login Direto</h2>
        <form id="form-login">
            <label for="nome">Nome:</label>
            <input id="nome" name="nome" type="text" value="Bruno Costa" required>

            <label for="email">E-mail:</label>
            <input id="email" name="email" type="email" value="bruno@example.com" required>
            
            <label for="senha">Senha:</label>
            <input id="senha" name="senha" type="password" value="123456" required>
            
            <button type="submit">Entrar</button>
        </form>
    </div>

    <h3>Resultado:</h3>
    <pre id="saida">Nenhuma tentativa realizada.</pre>

    <script src="app.js"></script>
</body>
</html>
